<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Navkar Stationary</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
</head>
<body class="login-page-bg">
    <div class="login-card">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Navkar Stationary" class="login-logo-img">
        <h3 class="fw-bold mb-1 mt-2">Admin Login</h3>
        <p class="text-muted small mb-4">Sign in to manage Navkar Stationary</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} rounded-4 small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold text-muted ms-1">Username</label>
                <input type="text" name="username" class="form-control" required placeholder="admin">
            </div>

            <div class="mb-4 text-start">
                <label class="form-label small fw-bold text-muted ms-1">Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="passwordInput" class="form-control border-end-0" required placeholder="••••••••">
                    <span class="input-group-text bg-transparent" id="togglePassword">
                        <i class="bi bi-eye-slash" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-login">Login Securely</button>
        </form>

        <div class="mt-4">
            <a href="/" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#passwordInput');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('bi-eye');
            eyeIcon.classList.toggle('bi-eye-slash');
        });
    </script>
</body>
</html>
