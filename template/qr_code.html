<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navkar Stationery - Scan to Order</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ versioned_static('theme.css') }}">
</head>
<body class="qr-page-bg">
    <div class="qr-card">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Navkar Stationery" class="qr-logo-img mb-3">
        <div class="title">Navkar Stationery</div>
        <div class="subtitle">Scan this code with your phone camera to quickly send us your requirement!</div>

        <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code" class="qr-image">

        <div>
            <a href="/admin" class="btn-back">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
